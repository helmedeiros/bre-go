name: scientific

# Runs the pre-registered scientific validation suite for snapshot
# releases. Tag-triggered (so every release that touches the snapshot
# format gets a clean signal) plus workflow_dispatch (so the suite can
# be invoked ad-hoc for investigation).
#
# Pre-registered bars are encoded in scientific/v0.15.0/scripts/run-all.sh.
# Do not loosen them to make CI green; if a bar misses, fix the cause
# or revise the claim that promised it.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release:
        description: "Release subdirectory under scientific/ (e.g. v0.15.0)"
        required: true
        default: "v0.15.0"
      trials:
        description: "Timing trials for E2 (>=10 recommended)"
        required: false
        default: "50"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set release path
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release=${{ github.event.inputs.release }}" >> "$GITHUB_OUTPUT"
            echo "trials=${{ github.event.inputs.trials }}"   >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF##*/}"
            echo "release=$tag" >> "$GITHUB_OUTPUT"
            echo "trials=50"    >> "$GITHUB_OUTPUT"
          fi

      - name: Verify suite exists for this release
        run: |
          dir="scientific/${{ steps.rel.outputs.release }}"
          if [ ! -d "$dir" ] || [ ! -x "$dir/scripts/run-all.sh" ]; then
            echo "no scientific suite at $dir/scripts/run-all.sh -- skipping"
            exit 78  # neutral
          fi

      - name: Set up Docker Buildx (multi-arch)
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Run scientific suite
        env:
          TRIALS_E2: ${{ steps.rel.outputs.trials }}
        run: |
          bash scientific/${{ steps.rel.outputs.release }}/scripts/run-all.sh

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scientific-${{ steps.rel.outputs.release }}-${{ github.run_id }}
          path: scientific/${{ steps.rel.outputs.release }}/results/
          retention-days: 90
